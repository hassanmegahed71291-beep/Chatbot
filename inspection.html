<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspection | QUALIO</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="site.js" defer></script>
</head>
<body>
  <header>
    <div class="toolbar">
      <div class="logo-mark"><svg class="q-icon" viewBox="0 0 200 200" width="34" height="34" xmlns="http://www.w3.org/2000/svg">
  <g transform="rotate(-8 100 100)">
    <rect x="42" y="32" width="116" height="136" rx="20" fill="#f5c518"/>
    <circle cx="76" cy="56" r="10" fill="none" stroke="#152238" stroke-width="7"/>
    <path d="M60 116 L90 146 L146 78" fill="none" stroke="#152238"
          stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg> QUALIO</div>
      <div class="toolbar-actions">
        <span id="authSlot"></span>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      </div>
    </div>
  </header>

  <aside id="sidebar">
    <ul>
      <li><a href="index.html">🏠 Home</a></li>
      <li><a href="dashboard.html">📊 Dashboard</a></li>
      <li><a href="inspection.html">📝 Inspection</a></li>
      <li><a href="aql.html">📈 AQL Calculator</a></li>
      <li><a href="about.html">ℹ️ About</a></li>
      <li><a href="suggestions.html">💡 Suggestions</a></li>
    </ul>
  </aside>
  <div id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <div class="page-wrap" style="max-width:820px;">
    <h2 style="margin:24px 0 4px;">فحص جودة جديد</h2>
    <p class="small-muted" style="margin-bottom:20px;">سجّل بيانات الفحص وسيتم حساب حجم العينة والقرار تلقائيًا حسب معيار AQL</p>

    <div class="page-card">
      <div class="grid-2">
        <label>اسم المصنع
          <input id="factory" placeholder="مثال: مصنع النور للملابس" required>
        </label>
        <label>رقم أمر الشراء (PO)
          <input id="po" placeholder="PO-2026-014">
        </label>
        <label>الموديل / الستايل
          <input id="style" placeholder="قميص قطن رجالي">
        </label>
        <label>حجم اللوت
          <input id="lotSize" type="number" value="1000" min="2">
        </label>
        <label>مستوى AQL
          <select id="aqlLevel">
            <option value="1.0">1.0</option>
            <option value="1.5">1.5</option>
            <option value="2.5" selected>2.5</option>
            <option value="4.0">4.0</option>
          </select>
        </label>
        <label>تاريخ الفحص
          <input id="insDate" type="date">
        </label>
      </div>

      <div class="grid-2" style="margin-top:14px;">
        <label>عيوب Critical المكتشفة
          <input id="critical" type="number" value="0" min="0">
        </label>
        <label>عيوب Major المكتشفة
          <input id="major" type="number" value="0" min="0">
        </label>
        <label>عيوب Minor المكتشفة
          <input id="minor" type="number" value="0" min="0">
        </label>
      </div>

      <label style="display:block;margin-top:14px;">ملاحظات
        <textarea id="notes" rows="3" placeholder="ملاحظات إضافية..."></textarea>
      </label>

      <div id="resultBox" style="display:none;"></div>

      <button id="saveBtn" style="margin-top:16px;background:#152238;color:#fff;padding:12px 20px;font-weight:700;border-radius:4px;">حفظ الفحص</button>
      <p id="saveMsg" class="small-muted" style="margin-top:8px;"></p>
    </div>
  </div>

  <script>
    var fields = ["lotSize", "aqlLevel", "critical", "major", "minor"];

    function currentResult() {
      var lotSize = parseInt(document.getElementById("lotSize").value) || 0;
      var aqlLevel = parseFloat(document.getElementById("aqlLevel").value);
      var found = {
        critical: parseInt(document.getElementById("critical").value) || 0,
        major: parseInt(document.getElementById("major").value) || 0,
        minor: parseInt(document.getElementById("minor").value) || 0,
      };
      var result = calcAQL(lotSize, aqlLevel);
      return { lotSize: lotSize, aqlLevel: aqlLevel, found: found, result: result };
    }

    function updatePreview() {
      var c = currentResult();
      var box = document.getElementById("resultBox");
      if (!c.result) { box.style.display = "none"; return; }

      var verdict = (c.found.critical <= c.result.accept && c.found.major <= c.result.accept && c.found.minor <= c.result.accept) ? "pass" : "fail";
      box.style.display = "block";
      box.className = "result-box " + verdict;
      box.innerHTML =
        '<b>' + (verdict === "pass" ? "✅ القرار: قبول (Pass)" : "❌ القرار: رفض (Fail)") + '</b>' +
        '<div class="small-muted" style="margin-top:6px;">رمز حجم العينة: ' + c.result.code +
        ' — حجم العينة: ' + c.result.sampleSize +
        ' — Accept: ' + c.result.accept + ' / Reject: ' + c.result.reject + '</div>';
    }

    fields.forEach(function (id) {
      document.getElementById(id).addEventListener("input", updatePreview);
    });
    updatePreview();

    document.getElementById("saveBtn").addEventListener("click", function () {
      var factory = document.getElementById("factory").value.trim();
      if (!factory) { document.getElementById("saveMsg").textContent = "اكتب اسم المصنع أولًا"; return; }

      var c = currentResult();
      if (!c.result) { document.getElementById("saveMsg").textContent = "حجم اللوت غير صالح"; return; }

      var verdict = (c.found.critical <= c.result.accept && c.found.major <= c.result.accept && c.found.minor <= c.result.accept) ? "pass" : "fail";

      saveInspection({
        id: Date.now().toString(),
        date: document.getElementById("insDate").value ? new Date(document.getElementById("insDate").value).toISOString() : new Date().toISOString(),
        factory: factory,
        po: document.getElementById("po").value.trim(),
        style: document.getElementById("style").value.trim(),
        lotSize: c.lotSize,
        aqlLevel: c.aqlLevel,
        sampleSize: c.result.sampleSize,
        found: c.found,
        verdict: verdict,
        notes: document.getElementById("notes").value.trim(),
      });

      document.getElementById("saveMsg").innerHTML = '✅ تم الحفظ. <a href="dashboard.html">عرض في لوحة التحكم</a>';
      document.getElementById("factory").value = "";
      document.getElementById("po").value = "";
      document.getElementById("style").value = "";
      document.getElementById("notes").value = "";
      ["critical", "major", "minor"].forEach(function (id) { document.getElementById(id).value = 0; });
      updatePreview();
    });
  </script>
</body>
</html>
