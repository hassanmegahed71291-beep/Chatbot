<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | QUALIO</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="site.js" defer></script>
</head>
<body>
  <header>
    <div class="toolbar">
      <div class="logo-mark"><svg class="q-icon" viewBox="0 0 200 200" width="34" height="34" xmlns="http://www.w3.org/2000/svg">
  <g transform="rotate(-8 100 100)">
    <rect x="42" y="32" width="116" height="136" rx="20" fill="#f5c518"/>
    <circle cx="76" cy="56" r="10" fill="none" stroke="#152238" stroke-width="7"/>
    <path d="M60 116 L90 146 L146 78" fill="none" stroke="#152238"
          stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg> QUALIO</div>
    </div>
  </header>

  <div class="page-wrap">
    <div class="page-card" style="max-width:380px;margin:40px auto;">
      <h2 style="margin-bottom:6px;">تسجيل الدخول</h2>
      <p class="small-muted" style="margin-bottom:16px;">للوصول إلى لوحة التحكم الإدارية</p>
      <form id="loginForm" class="form-card">
        <input type="text" id="username" placeholder="اسم المستخدم" required>
        <input type="password" id="password" placeholder="كلمة المرور" required>
        <button type="submit">دخول</button>
      </form>
      <p id="loginMsg" class="small-muted" style="color:#c1443a;margin-top:10px;"></p>
      <p class="small-muted" style="margin-top:16px;">تجربة: admin / 1234</p>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var user = document.getElementById("username").value.trim();
      var pass = document.getElementById("password").value;
      if (login(user, pass)) {
        window.location.href = "dashboard.html";
      } else {
        document.getElementById("loginMsg").textContent = "بيانات الدخول غير صحيحة";
      }
    });
  </script>
</body>
</html>
