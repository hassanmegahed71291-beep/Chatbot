<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QUALIO - الإعدادات</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- القائمة الجانبية -->
  <aside class="sidebar">
    <div class="logo">
      <h2>QUALIO</h2>
    </div>
    <ul class="menu">
      <li><a href="index.html">🏠 الرئيسية</a></li>
      <li><a href="academy.html">🎓 قسم التعلّم</a></li>
      <li><a href="aql.html">📊 قسم AQL</a></li>
      <li><a href="reports.html">📑 التقارير</a></li>
      <li><a href="community.html">👥 المجتمع</a></li>
      <li><a href="suppliers.html">🏭 الموردين</a></li>
      <li><a href="users.html">👤 المستخدمين</a></li>
      <li><a href="settings.html" class="active">⚙️ الإعدادات</a></li>
    </ul>
  </aside>

  <!-- المحتوى الرئيسي -->
  <main class="content">
    <header>
      <h1>⚙️ الإعدادات</h1>
      <p>تخصيص المنصة حسب تفضيلاتك</p>
    </header>

    <!-- إعدادات اللغة -->
    <section class="card">
      <h3>🌐 اللغة</h3>
      <p>اختر لغة العرض للمنصة</p>
      <button onclick="toggleLanguage()">تغيير اللغة</button>
    </section>

    <!-- إعدادات المظهر -->
    <section class="card">
      <h3>🎨 المظهر</h3>
      <p>اختر وضع العرض المناسب</p>
      <button onclick="document.body.style.backgroundColor='#fff'; alert('✅ تم تفعيل الوضع الفاتح')">الوضع الفاتح</button>
      <button onclick="document.body.style.backgroundColor='#222'; document.body.style.color='#fff'; alert('✅ تم تفعيل الوضع الداكن')">الوضع الداكن</button>
    </section>

    <!-- إعدادات الحساب -->
    <section class="card">
      <h3>👤 الحساب</h3>
      <p>إدارة بياناتك الشخصية</p>
      <input type="text" placeholder="اسم المستخدم" style="width:100%; margin-bottom:10px;">
      <input type="email" placeholder="البريد الإلكتروني" style="width:100%; margin-bottom:10px;">
      <button onclick="alert('✅ تم تحديث بيانات الحساب')">تحديث البيانات</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
