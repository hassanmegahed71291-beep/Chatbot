<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>اقتراحات الفريق</title>
  <style>
    body { font-family: Tahoma, sans-serif; background: #f4f4f4; padding: 20px; }
    h2 { color: #333; }
    form { margin-bottom: 20px; }
    textarea { width: 100%; height: 100px; padding: 10px; margin-bottom: 10px; }
    button { padding: 10px 20px; background: #1a73e8; color: #fff; border: none; cursor: pointer; }
    button:hover { background: #0c47a1; }
    #responseMessage { color: green; font-weight: bold; }
  </style>
</head>
<body>
  <h2>💡 قسم اقتراحات الفريق</h2>
  <form id="suggestionForm">
    <textarea id="suggestionText" placeholder="اكتب اقتراحك هنا..." required></textarea>
    <button type="submit">إرسال</button>
  </form>
  <p id="responseMessage"></p>

  <script>
    document.getElementById("suggestionForm").addEventListener("submit", function(e){
      e.preventDefault();
      let suggestion = document.getElementById("suggestionText").value;
      let user = localStorage.getItem("user") || "عضو مجهول";

      // حفظ الاقتراح في التخزين المحلي
      let allSuggestions = JSON.parse(localStorage.getItem("suggestions")) || [];
      allSuggestions.push({user: user, text: suggestion});
      localStorage.setItem("suggestions", JSON.stringify(allSuggestions));

      // رسالة شكر وتحفيز
      document.getElementById("responseMessage").innerText = 
        "شكراً يا " + user + "، هعرض فكرتك على المدير 👏";

      // إضافة نقاط للعضو
      let currentPoints = parseInt(localStorage.getItem("points")) || 0;
      localStorage.setItem("points", currentPoints + 5);
    });
  </script>
</body>
</html>
